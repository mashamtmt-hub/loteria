<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Gold Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --gold-dark: #b8860b; --dark: #0a0a0a; --blue: #0ea5e9; }
        body { 
            background: var(--dark); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; justify-content: center;
        }
        
        /* KONTENER GŁÓWNY */
        .container { 
            background: #111; padding: 30px; border-radius: 40px; 
            border: 2px solid var(--gold-dark); width: 100%; max-width: 380px; 
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(184, 134, 11, 0.2); text-align: center;
        }

        /* SALDO */
        .balance-card { 
            background: linear-gradient(135deg, #222, #000); border: 2px solid var(--gold);
            padding: 10px 30px; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px;
            margin-bottom: 30px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        #balance { font-size: 2.2rem; font-weight: 900; color: var(--gold); }

        /* ZŁOTA RAMA KOŁA */
        .wheel-outer {
            position: relative; width: 340px; height: 340px; margin: 20px auto;
            border-radius: 50%; padding: 15px;
            background: linear-gradient(145deg, #ffd700, #8b6508, #ffd700, #b8860b);
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.5);
        }

        /* LAMPKI (MARQUEE) */
        .lights-container {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            border-radius: 50%; pointer-events: none;
        }
        .light {
            position: absolute; width: 8px; height: 8px; background: white;
            border-radius: 50%; top: 50%; left: 50%; transform-origin: -160px center;
            box-shadow: 0 0 8px white; animation: blink 1s infinite;
        }

        /* KOŁO */
        #wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 4px solid #000;
            background: conic-gradient(
                #e11d48 0deg 60deg,    /* Czerwony */
                #f59e0b 60deg 120deg,  /* Żółty */
                #10b981 120deg 180deg, /* Zielony */
                #0ea5e9 180deg 240deg, /* Niebieski */
                #6366f1 240deg 300deg, /* Indygo */
                #d946ef 300deg 360deg  /* Różowy */
            );
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            position: relative; overflow: hidden;
        }

        /* ETYKIETY - POZIOME I WYCENTROWANE */
        .label {
            position: absolute; width: 80px; height: 40px; top: 50%; left: 50%;
            margin-top: -20px; margin-left: -40px; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: white; font-size: 1.8rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,1);
        }

        /* STRZAŁKA PREMIUM */
        .arrow {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 50px; z-index: 100;
            background: linear-gradient(to bottom, #ff0000, #800000);
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            border: 2px solid var(--gold); filter: drop-shadow(0 4px 10px black);
        }

        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; background: radial-gradient(circle, #333, #000);
            z-index: 50; border: 5px solid var(--gold); border-radius: 50%;
            box-shadow: 0 0 20px black;
        }

        /* PRZYCISK VEGAS */
        button {
            background: linear-gradient(180deg, var(--gold), var(--gold-dark)); 
            color: black; border: none; padding: 22px; border-radius: 20px; 
            font-weight: 900; width: 100%; font-size: 1.4rem; cursor: pointer;
