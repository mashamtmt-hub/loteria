        :root { --blue: #0ea5e9; --dark: #020617; --card: #1e293b; --gold: #fbbf24; --red: #ef4444; }
        body {

            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; justify-content: center;

        .container {

            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); text-align: center;

        .balance-card { 
            background: rgba(14, 165, 233, 0.15); border: 2px solid var(--blue);

        #balance { font-size: 2.2rem; font-weight: 900; color: var(--blue); }

        .wheel-box { position: relative; width: 340px; height: 340px; margin: 25px auto; }
        
        .arrow {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 45px solid #ffffff; z-index: 100; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        #wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 12px solid #0f172a;
            background: conic-gradient(

                #6366f1 60deg 120deg,  /* +5  */
                #ec4899 120deg 180deg, /* +10 */
                var(--red) 180deg 240deg, /* 0   */
                var(--gold) 240deg 300deg, /* +25 */
                #10b981 300deg 360deg  /* +2  */
            );
            transition: transform 4s cubic-bezier(0.15, 0, 0.1, 1);
            position: relative; overflow: hidden;
        }
        
        /* ETYKIETY - IDEALNIE WYCENTROWANE W SEGMENCIE */
        .label {
            position: absolute; 
            width: 50%; /* Od środka do krawędzi */
            height: 60px; 
            top: calc(50% - 30px); 
            left: 50%;
            transform-origin: left center; 
            display: flex; 
            align-items: center; 
            justify-content: center; /* Centruje wzdłuż promienia */
            padding-left: 45px; /* Odsuwa od ciasnego środka koła */
            box-sizing: border-box;
            font-weight: 900; 
            color: white; 
            font-size: 1.8rem; /* Jeszcze większe i czytelniejsze */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            pointer-events: none;
        }

        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: #0f172a; border-radius: 50%;
            z-index: 50; border: 4px solid white; display: flex; align-items: center; justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; 
            border: none; padding: 20px; border-radius: 24px; font-weight: 900; 
            width: 100%; font-size: 1.3rem; cursor: pointer; transition: 0.2s;
            margin-top: 15px; box-shadow: 0 8px 0 #1d4ed8; text-transform: uppercase;
        }
        button:disabled { background: #334155; color: #64748b; box-shadow: none; transform: translateY(4px); opacity: 0.6; }

        #status { font-weight: 900; margin: 15px 0; min-height: 1.6em; color: var(--gold); font-size: 1.4rem; text-transform: uppercase; }
    </style>
