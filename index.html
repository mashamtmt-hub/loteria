<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loteria Diamentów</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; justify-content: space-between;
        }
        h1 { font-size: 1.3rem; color: #38bdf8; text-transform: uppercase; margin-top: 0; }
        #spins-info { font-size: 1.1rem; color: #fbbf24; font-weight: bold; }

        /* KOŁO GENEROWANE KODEM */
        .wheel-box { position: relative; width: 250px; height: 250px; margin: 20px 0; }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 5px solid #1e293b;
            background: conic-gradient(
                #3b82f6 0deg 60deg, #1d4ed8 60deg 120deg, 
                #3b82f6 120deg 180deg, #1d4ed8 180deg 240deg,
                #3b82f6 240deg 300deg, #1d4ed8 300deg 360deg
            );
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .arrow {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 25px solid #ef4444; z-index: 10;
        }

        button {
            background: linear-gradient(to right, #38bdf8, #2563eb);
            color: white; border: none; padding: 18px 0; font-size: 1.1rem;
            font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%;
        }
        button:disabled { background: #334155; color: #64748b; }
        
        #status { font-size: 1.2rem; font-weight: bold; min-height: 1.5em; }
        .balance-info { padding: 15px; border-top: 1px solid #1e293b; width: 100%; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>💎 LOTERIA DIAMENTÓW 💎</h1>
    <div id="spins-info">Sprawdzanie spinów...</div>

    <div class="wheel-box">
        <div class="arrow"></div>
        <div id="wheel"></div>
    </div>

    <button id="spin-button" onclick="startSpin()" disabled>ZAKRĘĆ!</button>
    <div id="status"></div>
    <div id="balance-display" class="balance-info">Saldo: 0 💎</div>

    <script>
        const SUPABASE_URL = "https://qbcqqukdhjsavkzvgcfx.supabase.co";
        // WKLEJ KLUCZ BEZ LITERY T NA POCZĄTKU!
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiY3FxdWtkaGpzYXZrenZnY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzY2NzMsImV4cCI6MjA4ODQ1MjY3M30.a5_02lYV09HNcAWJF_btRmFR0323EArMcTrT29lL9D8"; 
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const tele = window.Telegram.WebApp;
        tele.expand();

        let userSpins = 0;
        let userBalance = 0;
        const userId = tele.initDataUnsafe?.user?.id?.toString() || "test_user";

        async function loadUserData() {
            let { data: profile, error } = await supabase.from('profiles').select('*').eq('user_id', userId).single();
            if (profile) {
                userSpins = profile.spins || 0;
                userBalance = profile.balance || 0;
                document.getElementById('spins-info').innerText = `Dostępne spiny: ${userSpins}`;
                document.getElementById('balance-display').innerText = `Saldo: ${userBalance} 💎`;
                document.getElementById('spin-button').disabled = (userSpins <= 0);
            }
        }

        async function startSpin() {
            if (userSpins <= 0) return;
            document.getElementById('spin-button').disabled = true;
            
            // Odejmij spin
            await supabase.from('profiles').update({ spins: userSpins - 1 }).eq('user_id', userId);

            const deg = Math.floor(Math.random() * 360) + 3600;
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;

            setTimeout(async () => {
                let prize = 0;
                const chance = Math.random() * 100;
                if (chance < 70) prize = Math.floor(Math.random() * 5) + 1;
                else if (chance < 90) prize = Math.floor(Math.random() * 15) + 10;
                else if (chance < 99) prize = 50;
                else prize = 250;

                document.getElementById('status').innerText = `Wygrana: +${prize} 💎`;
                await supabase.from('profiles').update({ balance: userBalance + prize }).eq('user_id', userId);
                loadUserData();
            }, 4000);
        }

        loadUserData();
    </script>
</body>
</html>
