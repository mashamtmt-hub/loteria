<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loteria Diamentów</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: #0f172a; 
            color: white; 
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        h1 { font-size: 1.4rem; color: #38bdf8; margin: 10px 0; }
        #spins-info { font-size: 1.1rem; color: #fbbf24; margin-bottom: 10px; }

        /* Kontener na koło */
        .wheel-box {
            position: relative;
            width: 260px; height: 260px;
            margin: 20px auto;
        }
        #wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px solid #38bdf8;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .arrow {
            position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ef4444;
            z-index: 10;
        }

        button {
            background: linear-gradient(to right, #38bdf8, #2563eb);
            color: white; border: none;
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            border-radius: 12px; cursor: pointer;
            margin-top: 20px; width: 80%;
        }
        button:disabled { background: #334155; color: #94a3b8; }
        
        #status { margin-top: 20px; font-size: 1.2rem; font-weight: bold; min-height: 1.5em; }
        .balance-info { margin-top: auto; padding-bottom: 20px; font-size: 1rem; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>💎 LOTERIA DIAMENTÓW 💎</h1>
    <div id="spins-info">Pobieranie danych...</div>

    <div class="wheel-box">
        <div class="arrow"></div>
        <img id="wheel" src="https://img.freepik.com/premium-vector/wheel-fortune-isolated-white-background_164343-41.jpg" alt="Wheel">
    </div>

    <button id="spin-button" onclick="startSpin()" disabled>ZAKRĘĆ!</button>
    <div id="status"></div>
    <div id="balance-display" class="balance-info">Saldo: --- 💎</div>

    <script>
        const SUPABASE_URL = "https://qbcqqukdhjsavkzvgcfx.supabase.co";
        // Upewnij się, że klucz zaczyna się od eyJ... (bez T na początku!)
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiY3FxdWtkaGpzYXZrenZnY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzY2NzMsImV4cCI6MjA4ODQ1MjY3M30.a5_02lYV09HNcAWJF_btRmFR0323EArMcTrT29lL9D8"; 
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const tele = window.Telegram.WebApp;
        tele.expand();

        let userSpins = 0;
        let userBalance = 0;
        const userId = tele.initDataUnsafe?.user?.id?.toString() || "test_user";

        async function loadUserData() {
            let { data: profile } = await supabase.from('profiles').select('*').eq('user_id', userId).single();
            if (profile) {
                userSpins = profile.spins || 0;
                userBalance = profile.balance || 0;
                document.getElementById('spins-info').innerText = `Dostępne spiny: ${userSpins}`;
                document.getElementById('balance-display').innerText = `Twoje saldo: ${userBalance} 💎`;
                document.getElementById('spin-button').disabled = (userSpins <= 0);
            }
        }

        async function startSpin() {
            if (userSpins <= 0) return;
            document.getElementById('spin-button').disabled = true;
            document.getElementById('status').innerText = "Losowanie...";

            // 1. Odejmij spin w bazie
            const { error } = await supabase.from('profiles').update({ spins: userSpins - 1 }).eq('user_id', userId);
            if (error) { alert("Błąd bazy danych!"); return; }

            // 2. Animacja
            const deg = Math.floor(Math.random() * 360) + 3600;
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;

            setTimeout(async () => {
                // 3. Losowanie nagrody
                let prize = 0;
                const chance = Math.random() * 100;
                if (chance < 70) prize = Math.floor(Math.random() * 5) + 1;
                else if (chance < 90) prize = Math.floor(Math.random() * 15) + 10;
                else if (chance < 99) prize = 50;
                else prize = 250;

                document.getElementById('status').innerText = `Wygrana: ${prize} 💎`;
                
                // 4. Zapisz wygraną
                await supabase.from('profiles').update({ balance: userBalance + prize }).eq('user_id', userId);
                loadUserData();
            }, 4000);
        }

        loadUserData();
    </script>
</body>
</html>
