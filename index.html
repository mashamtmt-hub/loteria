<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Elite Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0ea5e9; --dark: #020617; --card: #1e293b; --gold: #fbbf24; --red: #ef4444; }
        body { 
            background: var(--dark); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; justify-content: center;
        }
        .container { 
            background: var(--card); padding: 30px; border-radius: 32px; 
            border: 1px solid #334155; width: 100%; max-width: 360px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); text-align: center;
        }
        .balance-card { 
            background: rgba(14, 165, 233, 0.15); border: 2px solid var(--blue);
            padding: 12px 25px; border-radius: 20px; display: inline-flex; align-items: center; gap: 10px;
            margin-bottom: 25px;
        }
        #balance { font-size: 2rem; font-weight: 900; color: var(--blue); }

        /* KOŁO FORTUNY */
        .wheel-box { position: relative; width: 310px; height: 310px; margin: 25px auto; }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 10px solid #0f172a;
            background: conic-gradient(
                #0ea5e9 0 60deg,    /* +1 */
                #8b5cf6 60deg 120deg,  /* +5 */
                #f43f5e 120deg 180deg, /* +10 */
                var(--red) 180deg 240deg, /* 0 */
                var(--gold) 240deg 300deg, /* +25 */
                #2563eb 300deg 360deg  /* +2 */
            );
            transition: transform 4s cubic-bezier(0.2, 0, 0.1, 1);
            position: relative; overflow: hidden;
        }
        
        /* Styl napisów na kole */
        .label {
            position: absolute; width: 50%; height: 40px; top: calc(50% - 20px); left: 50%;
            transform-origin: left center; font-weight: 900; text-align: right; 
            padding-right: 30px; pointer-events: none; color: white; 
            font-size: 1.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: flex-end;
        }

        .arrow {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 35px solid #ffffff; z-index: 20; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }
        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 55px; height: 55px; background: #0f172a; border-radius: 50%;
            z-index: 15; border: 4px solid white; display: flex; align-items: center; justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; 
            border: none; padding: 20px; border-radius: 20px; font-weight: 800; 
            width: 100%; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
            margin-top: 15px; box-shadow: 0 8px 0 #1d4ed8;
        }
        button:disabled { background: #334155; color: #64748b; box-shadow: none; transform: translateY(4px); opacity: 0.6; }
        button:active { transform: translateY(2px); box-shadow: 0 4px 0 #1d4ed8; }

        #status { font-weight: 900; margin: 15px 0; min-height: 1.6em; color: var(--gold); font-size: 1.3rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="balance-card">
            <span id="balance">0</span> <span>💎</span>
        </div>

        <div class="wheel-box">
            <div class="arrow"></div>
            <div class="wheel-center">💎</div>
            <div id="wheel">
                <div class="label" style="transform: rotate(30deg)">+1</div>
                <div class="label" style="transform: rotate(90deg)">+5</div>
                <div class="label" style="transform: rotate(150deg)">+10</div>
                <div class="label" style="transform: rotate(210deg)">0</div>
                <div class="label" style="transform: rotate(270deg)">+25</div>
                <div class="label" style="transform: rotate(330deg)">+2</div>
            </div>
        </div>

        <div id="status">ZAKRĘĆ KOŁEM!</div>
        
        <button id="spin-btn" onclick="startSpin()" disabled>ZAKRĘĆ ZA 2 💎</button>
        <div style="margin-top:15px; font-size:0.8rem; opacity:0.6;">Koszt: 2 diamenty</div>
    </div>

    <script>
        const S_URL = "https://qbcqqukdhjsavkzvgcfx.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiY3FxdWtkaGpzYXZrenZnY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzY2NzMsImV4cCI6MjA4ODQ1MjY3M30.a5_02lYV09HNcAWJF_btRmFR0323EArMcTrT29lL9D8";
        
        const sb = supabase.createClient(S_URL, S_KEY);
        const tg = window.Telegram.WebApp;
        const spinCost = 2;

        let userBalance = 0;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || new URLSearchParams(window.location.search).get('user_id') || "8461677673";

        async function sync() {
            try {
                tg.ready();
                let { data } = await sb.from('profiles').select('*').eq('user_id', userId).maybeSingle();
                if (!data) {
                    const { data: n } = await sb.from('profiles').insert([{ user_id: userId, balance: 10, spins: 0 }]).select().single();
                    data = n;
                }
                userBalance = data.balance || 0;
                document.getElementById('balance').innerText = userBalance;
                document.getElementById('spin-btn').disabled = (userBalance < spinCost);
            } catch (e) { console.error(e); }
        }

        async function startSpin() {
            if (userBalance < spinCost) return;
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            document.getElementById('status').innerText = "LOSOWANIE...";

            // 1. Wybierz nagrodę przed obrotem (0-5 index)
            const prizes = [1, 5, 10, 0, 25, 2];
            const winIndex = Math.floor(Math.random() * prizes.length);
            const winValue = prizes[winIndex];

            // 2. Odejmij koszt
            userBalance -= spinCost;
            await sb.from('profiles').update({ balance: userBalance }).eq('user_id', userId);
            document.getElementById('balance').innerText = userBalance;

            // 3. Oblicz kąt tak, by wylosowany segment trafił na górę
            // Środek segmentu winIndex to (winIndex * 60) + 30 stopni
            const targetAngle = (winIndex * 60) + 30;
            const extraSpins = 3600; // 10 pełnych obrotów
            const finalRotation = extraSpins + (360 - targetAngle);

            document.getElementById('wheel').style.transform = `rotate(${finalRotation}deg)`;

            setTimeout(async () => {
                userBalance += winValue;
                await sb.from('profiles').update({ balance: userBalance }).eq('user_id', userId);
                
                document.getElementById('balance').innerText = userBalance;
                document.getElementById('status').innerText = winValue > 0 ? `WYGRANA: +${winValue} 💎` : "PECH! 0 💎";
                btn.disabled = (userBalance < spinCost);
            }, 4000);
        }

        sync();
    </script>
</body>
</html>
