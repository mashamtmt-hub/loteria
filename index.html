<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loteria Diamentów</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%); 
            color: white; 
            padding: 20px;
            overflow: hidden;
        }
        h1 { color: #00d2ff; text-shadow: 0 0 10px #00d2ff; }
        .wheel-container { 
            position: relative; 
            width: 320px; 
            height: 320px; 
            margin: 30px auto; 
            border: 5px solid #00d2ff;
            border-radius: 50%;
            box-shadow: 0 0 20px #00d2ff;
        }
        #wheel { 
            width: 100%; 
            height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); 
        }
        /* Strzałka wskazująca nagrodę */
        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff0044;
            z-index: 10;
        }
        button { 
            padding: 15px 40px; 
            font-size: 20px; 
            font-weight: bold;
            cursor: pointer; 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); }
        button:disabled { background: #444; cursor: not-allowed; transform: scale(1); box-shadow: none; }
        #spins-info { font-size: 1.2rem; margin-bottom: 10px; color: #ffcc00; }
        #status { margin-top: 20px; font-size: 1.3rem; min-height: 1.5em; font-weight: bold; }
        .balance-info { font-size: 0.9rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>💎 LOTERIA DIAMENTÓW 💎</h1>
    <div id="spins-info">Ładowanie Twoich spinów...</div>

    <div class="wheel-container">
        <div class="arrow"></div>
        <img id="wheel" src="https://img.freepik.com/premium-vector/wheel-fortune-isolated-white-background_164343-41.jpg" alt="Koło fortuny">
    </div>

    <button id="spin-button" onclick="startSpin()" disabled>ZAKRĘĆ KOŁEM!</button>
    
    <div id="status"></div>
    <div id="balance-display" class="balance-info">Twoje saldo: --- 💎</div>

    <script>
        // --- KONFIGURACJA ---
        const SUPABASE_URL = "https://qbcqqukdhjsavkzvgcfx.supabase.co";
        const SUPABASE_KEY = "TeyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiY3FxdWtkaGpzYXZrenZnY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzY2NzMsImV4cCI6MjA4ODQ1MjY3M30.a5_02lYV09HNcAWJF_btRmFR0323EArMcTrT29lL9D8"; // WKLEJ SWÓJ KLUCZ TUTAJ
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const tele = window.Telegram.WebApp;
        tele.expand();

        let userSpins = 0;
        let userBalance = 0;
        // Pobieramy ID z Telegrama lub używamy testowego dla przeglądarki
        const userId = tele.initDataUnsafe?.user?.id?.toString() || "test_user";

        // --- POBIERANIE DANYCH Z BAZY ---
        async function loadUserData() {
            try {
                let { data: profile, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('user_id', userId)
                    .single();

                if (profile) {
                    userSpins = profile.spins || 0;
                    userBalance = profile.balance || 0;
                    
                    document.getElementById('spins-info').innerText = `Masz: ${userSpins} zakręceń`;
                    document.getElementById('balance-display').innerText = `Twoje saldo: ${userBalance} 💎`;
                    
                    if (userSpins > 0) {
                        document.getElementById('spin-button').disabled = false;
                        document.getElementById('spin-button').innerText = "ZAKRĘĆ KOŁEM!";
                    } else {
                        document.getElementById('spin-button').disabled = true;
                        document.getElementById('spin-button').innerText = "BRAK SPINÓW";
                    }
                } else {
                    document.getElementById('spins-info').innerText = "Nie masz jeszcze konta. Kup spiny u bota!";
                }
            } catch (err) {
                console.error("Błąd:", err);
            }
        }

        // --- LOGIKA LOSOWANIA I PROCENTÓW ---
        async function startSpin() {
    // 1. Sprawdzamy, czy gracz ma spiny ZANIM zaczniemy
    if (userSpins <= 0) {
        alert("Brak spinów! Kup je u bota.");
        return;
    }

    document.getElementById('spin-button').disabled = true;
    
    // 2. Odejmujemy 1 spin w bazie danych (TO MUSI SIĘ UDAĆ)
    const { error: spinError } = await supabase
        .from('profiles')
        .update({ spins: userSpins - 1 })
        .eq('user_id', userId);

    if (spinError) {
        console.error("Błąd bazy:", spinError);
        alert("Baza nie pozwoliła zabrać spina. Wykonaj Krok 1 (SQL)!");
        document.getElementById('spin-button').disabled = false;
        return;
    }

    // 3. Animacja koła
    const randomDegree = Math.floor(Math.random() * 360) + 3600;
    document.getElementById('wheel').style.transform = `rotate(${randomDegree}deg)`;

    // 4. Losowanie nagrody (Prawdziwe procenty!)
    setTimeout(async () => {
        let prize = 0;
        const chance = Math.random() * 100;

        if (chance < 70) { 
            prize = Math.floor(Math.random() * 5) + 1; // 1-5 diamentów
        } else if (chance < 90) { 
            prize = Math.floor(Math.random() * 15) + 10; // 10-25 diamentów
        } else if (chance < 99) { 
            prize = 50; 
        } else { 
            prize = 250; // JACKPOT
        }

        document.getElementById('status').innerHTML = `Wygrałeś: ${prize} 💎`;

        // 5. Zapisujemy wygraną do salda w bazie
        await supabase
            .from('profiles')
            .update({ balance: userBalance + prize })
            .eq('user_id', userId);

        // 6. Odświeżamy dane na ekranie (licznik się zaktualizuje)
        loadUserData();
    }, 4000);
}

        // Inicjalizacja przy starcie strony
        loadUserData();
    </script>
</body>
</html>
