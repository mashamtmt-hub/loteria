<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Połączenia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .debug-box { background: #1e293b; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #38bdf8; font-size: 0.8rem; text-align: left; }
        #wheel { width: 200px; height: 200px; border-radius: 50%; border: 5px solid #38bdf8; margin: 20px auto; background: conic-gradient(#3b82f6 0 180deg, #1d4ed8 180deg 360deg); transition: 4s; }
    </style>
</head>
<body>
    <h1>Loteria Diamentów</h1>
    <div id="status-info">Łączenie z bazą...</div>
    <div id="wheel"></div>
    <div id="debug" class="debug-box">Logi systemowe:</div>

    <script>
        const SUPABASE_URL = "https://qbcqqukdhjsavkzvgcfx.supabase.co";
        // TUTAJ WKLEJ NOWY KLUCZ SKOPIOWANY Z USTAWIEŃ:
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiY3FxdWtkaGpzYXZrenZnY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzY2NzMsImV4cCI6MjA4ODQ1MjY3M30.a5_02lYV09HNcAWJF_btRmFR0323EArMcTrT29lL9D8";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const debug = document.getElementById('debug');

        async function testConnection() {
            // Pobieramy ID z linku: ?user_id=8461677673
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id') || "test_user";
            
            debug.innerHTML += `<br>> Szukam ID: ${userId}`;

            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('user_id', userId);

            if (error) {
                debug.innerHTML += `<br>> ❌ BŁĄD: ${error.message}`;
                debug.style.borderColor = "red";
                document.getElementById('status-info').innerText = "Błąd połączenia!";
            } else {
                debug.innerHTML += `<br>> ✅ SUKCES: Znaleziono wierszy: ${data.length}`;
                if (data.length > 0) {
                    document.getElementById('status-info').innerHTML = `SPINY: <b>${data[0].spins}</b>`;
                } else {
                    document.getElementById('status-info').innerText = "Nie znaleziono takiego ID w bazie.";
                }
            }
        }

        testConnection();
    </script>
</body>
</html>
