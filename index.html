<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loteria Diamentów - Naprawiona</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #38bdf8; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155; width: 100%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #wheel { width: 220px; height: 220px; border-radius: 50%; border: 8px solid #334155; margin: 20px auto; background: conic-gradient(var(--p) 0 60deg, #1d4ed8 60deg 120deg, var(--p) 120deg 180deg, #1d4ed8 180deg 240deg, var(--p) 240deg 300deg, #1d4ed8 300deg 360deg); transition: 4s cubic-bezier(0.15, 0, 0.15, 1); box-shadow: 0 0 30px rgba(56,189,248,0.2); }
        .status { font-size: 1.2rem; font-weight: bold; color: #fbbf24; margin: 15px 0; }
        .debug-log { font-size: 10px; color: #64748b; text-align: left; margin-top: 20px; background: #000; padding: 10px; border-radius: 5px; width: 100%; overflow: hidden; }
        button { background: var(--p); color: #000; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; }
        button:disabled { background: #334155; color: #64748b; }
    </style>
</head>
<body>

    <div class="card">
        <h1>LOTERIA</h1>
        <div id="status-info" class="status">Inicjalizacja...</div>
        <div id="wheel"></div>
        <button id="spin-btn" onclick="spin()" disabled>ZAKRĘĆ</button>
        <div id="balance" style="margin-top:15px">Saldo: --</div>
    </div>

    <div id="debug" class="debug-log">Logi: </div>

    <script>
        const SUPABASE_URL = "https://qbcqqukdhjsavkzvgcfx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiY3FxdWtkaGpzYXZrenZnY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzY2NzMsImV4cCI6MjA4ODQ1MjY3M30.a5_02lYV09HNcAWJF_btRmFR0323EArMcTrT29lL9D8";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const tele = window.Telegram.WebApp;
        
        // --- NIESTANDARDOWE POBIERANIE ID ---
        function getUserId() {
            // 1. Spróbuj z Telegrama
            if (tele.initDataUnsafe?.user?.id) return tele.initDataUnsafe.user.id.toString();
            // 2. Spróbuj z linku
            const urlId = new URLSearchParams(window.location.search).get('user_id');
            if (urlId) return urlId;
            // 3. Stwórz unikalne ID dla tej przeglądarki
            let localId = localStorage.getItem('guest_id');
            if (!localId) {
                localId = 'guest_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('guest_id', localId);
            }
            return localId;
        }

        const userId = getUserId();
        const log = (msg) => document.getElementById('debug').innerHTML += `<br>> ${msg}`;
        let userData = null;

        async function init() {
            tele.ready();
            log(`Użytkownik: ${userId}`);
            
            // Pobierz dane
            let { data, error } = await supabase.from('profiles').select('*').eq('user_id', userId).maybeSingle();

            if (error) {
                log(`❌ Błąd bazy: ${error.message}`);
                return;
            }

            // Jeśli profilu nie ma - STWÓRZ GO (Niestandardowe podejście)
            if (!data) {
                log("Nie znaleziono profilu. Tworzę nowy...");
                const { data: newData, error: insError } = await supabase
                    .from('profiles')
                    .insert([{ user_id: userId, spins: 5, balance: 0 }])
                    .select().single();
                
                if (insError) {
                    log(`❌ Nie udało się stworzyć profilu: ${insError.message}`);
                    return;
                }
                data = newData;
            }

            userData = data;
            renderUI();
        }

        function renderUI() {
            document.getElementById('status-info').innerText = `Spiny: ${userData.spins}`;
            document.getElementById('balance').innerText = `Saldo: ${userData.balance} 💎`;
            document.getElementById('spin-btn').disabled = userData.spins <= 0;
            log("✅ Dane załadowane.");
        }

        async function spin() {
            if (userData.spins <= 0) return;
            document.getElementById('spin-btn').disabled = true;

            // 1. Zabierz spin w bazie
            const { error } = await supabase.from('profiles').update({ spins: userData.spins - 1 }).eq('user_id', userId);
            
            if (error) {
                alert("Błąd połączenia!");
                return;
            }

            // 2. Animacja
            const deg = Math.floor(Math.random() * 360) + 3600;
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;

            setTimeout(async () => {
                const win = Math.floor(Math.random() * 50) + 1;
                // 3. Dodaj nagrodę
                await supabase.from('profiles').update({ balance: userData.balance + win }).eq('user_id', userId);
                
                // 4. Odśwież lokalnie
                userData.spins--;
                userData.balance += win;
                renderUI();
                alert(`Wygrana: ${win} 💎`);
            }, 4000);
        }

        init();
    </script>
</body>
</html>
