<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Wheel 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #0088cc; --dark: #121212; --gold: #fbbf24; }
        body { background: var(--dark); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .game-container { background: #1e1e1e; padding: 30px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; width: 90%; max-width: 350px; border: 1px solid #333; }
        #wheel { width: 250px; height: 250px; border-radius: 50%; border: 8px solid #333; margin: 20px auto; background: conic-gradient(var(--blue) 0 60deg, #005588 60deg 120deg, var(--blue) 120deg 180deg, #005588 180deg 240deg, var(--blue) 240deg 300deg, #005588 300deg 360deg); transition: 4s cubic-bezier(0.15, 0, 0.15, 1); position: relative; }
        #wheel::after { content: '💎'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; background: var(--dark); border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--blue); }
        button { background: var(--blue); color: white; border: none; padding: 15px 40px; border-radius: 15px; font-weight: bold; font-size: 1.2rem; cursor: pointer; width: 100%; transition: 0.3s; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #debug-console { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); font-family: monospace; font-size: 10px; color: #00ff00; padding: 10px; max-height: 100px; overflow-y: auto; text-align: left; border-top: 1px solid #00ff00; }
    </style>
</head>
<body>

    <div class="game-container">
        <h2 style="color: var(--blue); margin: 0;">DIAMOND LOTTERY</h2>
        <div id="status" style="margin: 15px 0; font-weight: bold; color: var(--gold);">Łączenie...</div>
        
        <div id="wheel"></div>
        
        <button id="spin-btn" onclick="runSpin()" disabled>ZAKRĘĆ!</button>
        <div id="balance" style="margin-top: 20px; font-size: 1.1rem; opacity: 0.8;">Saldo: -- 💎</div>
    </div>

    <div id="debug-console">System Booting...</div>

    <script>
        const S_URL = "https://qbcqqukdhjsavkzvgcfx.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiY3FxdWtkaGpzYXZrenZnY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzY2NzMsImV4cCI6MjA4ODQ1MjY3M30.a5_02lYV09HNcAWJF_btRmFR0323EArMcTrT29lL9D8";
        
        const supabase = window.supabase.createClient(S_URL, S_KEY);
        const tg = window.Telegram.WebApp;

        function printLog(msg) {
            const consoleObj = document.getElementById('debug-console');
            consoleObj.innerHTML += `<br>> ${msg}`;
            consoleObj.scrollTop = consoleObj.scrollHeight;
        }

        // --- Niestandardowe Pobieranie ID ---
        const userId = tg.initDataUnsafe?.user?.id?.toString() || new URLSearchParams(window.location.search).get('user_id') || "8461677673";

        let localSpins = 0;
        let localBalance = 0;

        async function startApp() {
            printLog("Startowanie WebApp...");
            tg.ready();
            tg.expand();
            
            printLog(`Szukam usera: ${userId}`);
            
            try {
                // Szukamy profilu (maybeSingle nie wywala błędu gdy nie ma usera)
                let { data: profile, error } = await supabase.from('profiles').select('*').eq('user_id', userId).maybeSingle();

                if (error) {
                    printLog("Błąd bazy: " + error.message);
                    return;
                }

                // Jeśli nie ma - dodajemy (Auto-rejestracja)
                if (!profile) {
                    printLog("Brak profilu. Tworzę nowy...");
                    const { data: newUser, error: err2 } = await supabase.from('profiles').insert([{ user_id: userId, spins: 10, balance: 0 }]).select().single();
                    if (err2) { printLog("Błąd zapisu: " + err2.message); return; }
                    profile = newUser;
                    printLog("Profil stworzony!");
                }

                localSpins = profile.spins || 0;
                localBalance = profile.balance || 0;
                updateUI();
                printLog("Gotowe do gry.");

            } catch (e) {
                printLog("Błąd krytyczny: " + e.message);
            }
        }

        function updateUI() {
            document.getElementById('status').innerText = `SPINY: ${localSpins}`;
            document.getElementById('balance').innerText = `Saldo: ${localBalance} 💎`;
            document.getElementById('spin-btn').disabled = (localSpins <= 0);
        }

        async function runSpin() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            printLog("Losowanie...");

            // 1. Odejmij spin w bazie (Niestandardowo: robimy to PRZED animacją dla uczciwości)
            const { error } = await supabase.from('profiles').update({ spins: localSpins - 1 }).eq('user_id', userId);
            if (error) { printLog("Błąd bazy: " + error.message); btn.disabled = false; return; }

            // 2. Animacja
            const deg = Math.floor(Math.random() * 360) + 3600;
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;

            setTimeout(async () => {
                const prize = Math.floor(Math.random() * 20) + 5;
                printLog(`Wygrana: ${prize} 💎. Zapisywanie...`);

                // 3. Dodaj nagrodę
                await supabase.from('profiles').update({ balance: localBalance + prize }).eq('user_id', userId);
                
                localSpins--;
                localBalance += prize;
                updateUI();
                alert(`Gratulacje! +${prize} 💎`);
            }, 4000);
        }

        startApp();
    </script>
</body>
</html>
